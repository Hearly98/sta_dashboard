<p-button (click)="showDialog()" icon="pi pi-user-plus" label="Agregar Nuevo/a"></p-button>
<p-dialog header="Ingresar Cliente" [(visible)]="visible" [style]="{width: '50vw'}">
  <div class="card">
    <p-messages [(value)]="messages" [enableService]="false" [closable]="false"></p-messages>
<form>
  <div class="grid gap-6 md:grid-cols-2 grid-cols-auto">
    <div>
      <label for="codigo" class="block mb-2 text-sm font-medium text-gray-900">Codigo</label>
      <input type="text" id="codigo" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 " required>
     </div>
      <div>
          <label for="barra" class="block mb-2 text-sm font-medium text-gray-900 ">Barra</label>
          <input type="text" id="barra" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 " required>
      </div>
      <div>
        <label for="producto" class="block mb-2 text-sm font-medium text-gray-900 ">Producto</label>
        <input type="tel" id="producto" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" pattern="[0-9]{3}[0-9]{3}[0-9]{3}" required>
      </div>
      <div>
          <label for="stock" class="block mb-2 text-sm font-medium text-gray-900 ">Stock</label>
          <input type="number" id="stock" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" pattern="[0-9]{3}[0-9]{3}[0-9]{3}" required>
      </div>
      <div class="mb-6">
        <label for="stock" class="block mb-2 text-sm font-medium text-gray-900 ">Precio Compra</label>
        <input type="number" id="stock" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" pattern="[0-9]{3}[0-9]{3}[0-9]{3}" required>
    </div>
    <div>
        <label for="direccion" class="block mb-2 text-sm font-medium text-gray-900 ">Precio 1</label>
        <input type="text" id="direccion" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" accordion >
      </div>
      <div class="mb-6">
        <label for="stock" class="block mb-2 text-sm font-medium text-gray-900 ">Precio 02</label>
        <input type="number" id="stock" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" pattern="[0-9]{3}[0-9]{3}[0-9]{3}" required>
    </div>
    <div class="mb-6">
        <label for="stock_min" class="block mb-2 text-sm font-medium text-gray-900 ">Stock Min</label>
        <input type="number" id="stock_min" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" pattern="[0-9]{3}[0-9]{3}[0-9]{3}" required>
    </div>
    <div class="mb-6">
        <select name="categoria" id="categoria"  class="font-medium">
          <option value="categoria1">CATEGORIA 1</option>
        </select>
        <input type="number" id="document" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" required>
    </div>
    <div class="mb-6">
        <select name="marca" id="marca" class="font-medium">
          <option value="marca1">MARCA 1</option>
        </select>
        <input type="number" id="document" class=" border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" required>
    </div>
  </div>
  <button type="submit" class="text-white my-4 bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center ">Guardar</button>
</form>

  </div>
</p-dialog>
