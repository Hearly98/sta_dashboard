<section class=" p-4 bg-slate-200 h-full">
  <div class="bg-slate-50">
   <div class="card">
     <p-breadcrumb [model]="itemsNav" [home]="home"></p-breadcrumb>
 </div>
 <div  class="grid grid-cols-2  justify-center">
     <h1 class="text-xl font-bold p-4">Categoria de Productos</h1>
 <div class="grid justify-center items-center justify-items-center">
  <app-modal />
 </div>
</div>
<hr>
<!--table-->
 <div class="relative overflow-x-auto sm:rounded-lg p-4">
   <table class="w-full text-sm text-left  border border-gray-300 h-auto">
       <thead class="bg-gray-300">
           <tr>
               <th scope="col" class="px-6 py-3">
                   Siglas
               </th>
               <th scope="col" class="px-6 py-3">
                 Categoria
               </th>
               <th scope="col" class="px-6 py-3">
                 Estado
               </th>
               <th scope="col" class="px-6 py-3 text-center">
                 Opciones
               </th>
           </tr>
       </thead>
       <tbody>
        @for (categoria of categorias(); track categoria) {
           <tr class="odd:bg-white  even:bg-gray-50  border-b ">
             <th scope="row" class="px-6 py-4 font-medium  whitespace-nowrap ">
               {{categoria.siglas}}
             </th>
             <td class="px-6 py-4">
               {{categoria.nombre}}
             </td>
             <td class="px-6 py-4 ">
                 <a href="#" class="font-medium text-green-500  hover:underline">{{categoria.estado}}</a>
             </td>
             <td class="card gap-4 flex justify-center p-4 ">
              <button><i class="pi pi-file-edit"></i></button>
              <button><i class="pi pi-trash"></i></button>
             </td>
           </tr>
          }
       </tbody>
   </table>
 </div>
 <!--message-->
<div class="p-4">
 <span>Mostrando del registro 1 al {{ categorias().length }} de un total de {{ categorias().length }} datos</span>
 <div></div>
</div>
  </div>

</section>
