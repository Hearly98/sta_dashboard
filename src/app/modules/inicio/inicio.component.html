<section class="p-2">
  <div class=" grid md:grid-cols-4 grid-cols-auto gap-5 m-2">
    <article class=" bg-amber-400 h-auto text-white text-base p-4 columns-2 ">
        <i class="pi pi-wallet opacity-50 text-7xl text-start"></i>
        <div class="text-end grid gap-2">
            <span>Caja</span>
            <span>S/.0.00</span>
        </div>
    </article>
    <article class=" bg-blue-700 h-auto text-white text-base p-4 columns-2">
        <i class="pi pi-money-bill  opacity-50 text-7xl"></i>
        <div class="text-end grid gap-2">
        <span>Ventas por Mes</span>
        <span>S/.0.00</span>
    </div>
    </article>
    <article class=" bg-gray-500 h-auto text-white text-base p-4 columns-2">
        <i class="pi pi-ticket opacity-50 text-7xl"></i>
        <div class="text-end grid gap-2">
            <span>Tickets Generados</span>
            <span>0</span>
        </div>
    </article>
    <article class=" bg-green-600 h-auto text-white text-base p-4 columns-2">
        <i class="pi pi-shopping-bag opacity-50 text-7xl"></i>
       <div class="text-end grid gap-2">
        <span>Compras</span>
        <span>S/.0.00</span>
       </div>
    </article>
    <article class=" bg-red-800 h-auto  text-white text-base p-4 columns-2" >
        <i class="pi pi-database opacity-50 text-7xl "></i>
        <div class="text-end grid gap-2">
            <span>Monto Total a Cobrar</span>
            <span>S/.0.00</span>
        </div>
    </article>
  </div>
    <article class="p-4 my-6 gap-6 w-3/4 grid md:grid-cols-2 grid-cols-auto md:w-auto">
            <p-chart class="border" type="bar" [data]="basicData" [options]="basicOptions"></p-chart>
            <p-chart class="border" type="bar" [data]="basicData" [options]="basicOptions"></p-chart>
    </article>
</section>
